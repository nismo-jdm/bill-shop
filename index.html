<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SwiftPOS — Billing System</title>

  <link rel="stylesheet" href="style.css" />

  <!-- Icons -->
  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
  />

  <!-- Barcode Scanner -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/quagga/0.12.1/quagga.min.js"></script>

  <!-- Barcode Generator -->
  <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.6/dist/JsBarcode.all.min.js"></script>

  <!-- PDF Export -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body>

  <div class="app-container">

    <!-- SIDEBAR -->
    <aside class="sidebar glass">
      <div class="logo">
        <i class="fa-solid fa-store"></i>
        <span>SwiftPOS</span>
      </div>

      <nav>
        <button class="nav-btn active" data-page="billingPage">
          <i class="fa-solid fa-cash-register"></i>
          Billing
        </button>

        <button class="nav-btn" data-page="productsPage">
          <i class="fa-solid fa-box"></i>
          Products
        </button>

        <button class="nav-btn" data-page="historyPage">
          <i class="fa-solid fa-clock-rotate-left"></i>
          Sales History
        </button>
      </nav>

      <div class="bottom-actions">
        <button id="themeToggle">
          <i class="fa-solid fa-moon"></i>
          Toggle Theme
        </button>
      </div>
    </aside>

    <!-- MAIN CONTENT -->
    <main class="main-content">

      <!-- TOPBAR -->
      <header class="topbar glass">
        <div>
          <h1>Retail Billing System</h1>
          <p>Professional POS Billing Software</p>
        </div>

        <div class="search-box">
          <i class="fa-solid fa-magnifying-glass"></i>
          <input type="text" id="searchProduct" placeholder="Search products..." />
        </div>
      </header>

      <!-- BILLING PAGE -->
      <section id="billingPage" class="page active-page">

        <div class="billing-grid">

          <!-- LEFT -->
          <div class="scanner-section glass card">

            <div class="section-header">
              <h2>Barcode Scanner</h2>
            </div>

            <div class="barcode-controls">
              <input
                type="text"
                id="barcodeInput"
                placeholder="Scan barcode here..."
              />

              <button id="cameraBtn">
                <i class="fa-solid fa-camera"></i>
                Camera Scan
              </button>
            </div>

            <div id="scanner-container"></div>

            <div class="products-list" id="productsList"></div>
          </div>

          <!-- RIGHT -->
          <div class="billing-section glass card">

            <div class="section-header">
              <h2>Current Bill</h2>
              <span id="invoiceNo"></span>
            </div>

            <table>
              <thead>
                <tr>
                  <th>Product</th>
                  <th>Qty</th>
                  <th>Price</th>
                  <th>Total</th>
                  <th></th>
                </tr>
              </thead>

              <tbody id="cartBody"></tbody>
            </table>

            <div class="totals">
              <div>
                <span>Subtotal</span>
                <strong id="subtotal">₹0</strong>
              </div>

              <div>
                <span>GST (5%)</span>
                <strong id="tax">₹0</strong>
              </div>

              <div>
                <span>Discount</span>
                <input type="number" id="discount" value="0" />
              </div>

              <div class="grand-total">
                <span>Grand Total</span>
                <strong id="grandTotal">₹0</strong>
              </div>
            </div>

            <div class="action-buttons">
              <button class="success" id="saveBillBtn">
                <i class="fa-solid fa-floppy-disk"></i>
                Save Bill
              </button>

              <button id="printBtn">
                <i class="fa-solid fa-print"></i>
                Print
              </button>

              <button id="pdfBtn">
                <i class="fa-solid fa-file-pdf"></i>
                Export PDF
              </button>

              <button class="danger" id="clearCartBtn">
                <i class="fa-solid fa-trash"></i>
                Clear
              </button>
            </div>
          </div>
        </div>
      </section>

      <!-- PRODUCTS PAGE -->
      <section id="productsPage" class="page">

        <div class="glass card">
          <div class="section-header">
            <h2>Product Management</h2>
          </div>

          <form id="productForm" class="product-form">
            <input type="hidden" id="editIndex" />

            <input type="text" id="productName" placeholder="Product Name" required />
            <input type="text" id="productBarcode" placeholder="Barcode" required />
            <input type="number" id="productPrice" placeholder="Price" required />
            <input type="number" id="productStock" placeholder="Stock Quantity" required />
            <input type="text" id="productCategory" placeholder="Category" required />

            <button type="submit">Save Product</button>
          </form>

          <div class="table-wrapper">
            <table>
              <thead>
                <tr>
                  <th>Name</th>
                  <th>Barcode</th>
                  <th>Price</th>
                  <th>Stock</th>
                  <th>Category</th>
                  <th>Barcode</th>
                  <th>Actions</th>
                </tr>
              </thead>

              <tbody id="productsTable"></tbody>
            </table>
          </div>
        </div>
      </section>

      <!-- HISTORY PAGE -->
      <section id="historyPage" class="page">

        <div class="glass card">
          <div class="section-header">
            <h2>Sales History</h2>
          </div>

          <div id="salesHistory"></div>
        </div>
      </section>

    </main>
  </div>

  <!-- PRINT AREA -->
  <div id="printArea"></div>

  <!-- SOUND -->
  <audio id="scanSound">
    <source src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3" type="audio/mpeg">
  </audio>

  <script src="script.js"></script>
</body>
</html>
